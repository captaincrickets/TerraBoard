
<!DOCTYPE html>
<html lang="en">
<head>
    <script type="text/javascript" defer></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERRABOARD</title>
    <style>
        * {
            box-sizing: border-box;
        }
        .flex {
            display: flex;
            gap: 20px; /* space between left & right */
            flex-direction: column;
        }

        /* Each side takes 50% of width */
        .left, .right {
            width: 100%;
            padding: 0px 10px;
        }

        /*Desktop layout*/
        @media (min-width: 1000px) {
            .flex {
                flex-direction: row;
                flex-wrap: nowrap;
            }
            .left, .right {
                width: 50%;
            }
        }

        /* Canvas styling */
        canvas {
            width: 100%;
            height: auto;
            border: 1px solid black;
            background-color: white;
            cursor: crosshair;
            display: block;
            justify-content: center;
        }

        /* Body & theme colors */
        body {
            font-family: 'Courier New', Courier, monospace;
            background-image: url("images/TerraBG.png");
            background-repeat: repeat;
            background-size: 400px;
            background-color: #ffffff;
            color: #321212;
            padding-left: 15px;
            padding-right: 15px;
            overflow-x: hidden;
        }

        body h1 {
            font-size: 35px;
            margin-bottom: 5px;
        }

        #maintitle {
            display: flex;
            justify-content: center;
            align-items: flex-end; /* vertical alignment */
            padding: 40px 10px;
            max-width: 100%;
            overflow: hidden;
        }
        #kanutitle img {
            height: clamp(35px, 7vw, 90px);
            width: auto;
            margin: -9px; /* space between letters */
        }

        /* Notice Styles */
        #status, #msgStatus {
            font-size: 15px;        /* change size */
            color: black;         /* default color */
            font-weight: bold;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div id="maintitle">
        <h1>TerraBoard</h1>
    </div>
    <div>
        <strong><p style="justify-content: center; font-size: 20px; text-align: center; line-height: 25px; background-color: antiquewhite; padding: 10px; border-radius: 10px;">Send Terra a message!</p></strong>
        <strong><p style="justify-content: center; font-size: 12px; text-align: center; line-height: 25px; background-color: antiquewhite; padding: 10px; border-radius: 10px;">This website was made as an alternative to strawpage. No user information is stored and all submissions are kept in a safe, private google drive folder that will be erased after the project is complete.</p></strong>
    </div>
    <div class="flex">
        <!-- Left: Drawbox -->
        <div class="left">
            <h1>DRAWBOX</h1>
            <canvas id="drawboxcanvas" width="600" height="500"></canvas>
            <div onclick="change_color(this)" style="background:red" class="stroke-color"></div>
            <div onclick="change_color(this)" style="background:blue" class="stroke-color"></div>
            <button onclick="Restore()">Undo</button>
            <button onclick="Clear()">Clear</button>
            <input type="color" oninput="stroke_color = this.value">
            <input type="range" min="1" max="100" oninput="stroke_width = this.value">
            <button id="submit">Submit drawing</button>
            <p id="status"></p>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxnYgHc1vPLwEkBPY__YyCqctvK33NmT6URE8zMK0pQM4zZXUrFDwnXDSSmlLWX0nFd/exec";
    </script>

    <script src="drawbox.js"></script>
    <script src="messagebox.js"></script>
</body>
</html>
